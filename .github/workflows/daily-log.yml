name: KiriMonoLog Daily Diary

on:
  schedule:
    - cron: "17 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: kirimonolog-daily
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate today's log
        run: python scripts/run_daily_log.py --repo-root .

      - name: Commit if changed
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add logs
          git commit -m "chore(log): daily KiriMonoLog $(date -u +'%Y-%m-%d')"
          git push
